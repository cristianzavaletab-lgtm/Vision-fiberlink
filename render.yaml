# Blueprint para despliegue automático en Render.com
services:
  # Servicio del Servidor (API + WebSockets)
  - type: web
    name: visioncontrol-server
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter server build
    preDeployCommand: pnpm --filter server exec prisma db push --schema=prisma/schema.prisma
    startCommand: pnpm --filter server exec prisma db push --schema=prisma/schema.prisma && node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://visioncontrol-frontend.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: DASHBOARD_ACCESS_TOKEN
        sync: false
      - key: AGENT_TOKEN
        sync: false
      - key: AGENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://visioncontrol-server.onrender.com/api/drive/callback
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 1WQBpwMqhCtLf3T5ca4s48yTjKyLVwUB2
      - key: GOOGLE_SYNC_MODE
        value: public
      - key: GOOGLE_SYNC_INTERVAL_MINUTES
        value: 5
      - key: GOOGLE_DRIVE_READ_ONLY
        value: "true"

  # Servicio del Frontend (Panel de Control)
  - type: web
    name: visioncontrol-frontend
    runtime: static
    buildCommand: pnpm install && pnpm --filter frontend build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://visioncontrol-server.onrender.com
